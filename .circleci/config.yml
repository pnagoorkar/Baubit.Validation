version: 2.1

#======================================= Workflows =======================================
workflows:
  version: 2
  build:
    jobs:
      - build:
          dotnet_solution_folder: "Baubit.Validation"
          dotnet_project_name: "Baubit.Validation"
          context:
            - Context_Prashant
          filters:
            tags:
              ignore: /.*/ #ignore any builds triggered by tags

      - test:
          requires:
            - build
          dotnet_solution_folder: "Baubit.Validation"
          dotnet_project_name: "Baubit.Validation"
          context:
            - Context_Prashant
          filters:
            tags:
              ignore: /.*/ #ignore any builds triggered by tags

      - pack_and_publish:
          requires:
            - test
          dotnet_solution_folder: "Baubit.Validation"
          dotnet_project_name: "Baubit.Validation"
          context:
            - Context_Prashant
          filters:
            tags:
              ignore: /.*/ #ignore any builds triggered by tags
            branches:
              only:
                - master

      - release:
          requires:
            - test
          dotnet_project_name: "Baubit.Validation"
          context:
            - Context_Prashant
          filters:
            tags:
              ignore: /.*/ #ignore any builds triggered by tags
            branches:
              only:
                - release
#======================================= End Workflows ===================================
jobs:
#======================================= Build ====================================

  build:
    parameters:
      dotnet_solution_folder:
        type: string
        default: ""
      dotnet_project_name:
        type: string
        default: ""
    docker:
      - image: $DOCKER_HUB_USERNAME/baubit:base
        auth:
            username: $DOCKER_HUB_USERNAME
            password: $DOCKER_HUB_PASSWORD
    steps:
      - run:
          name: Parameter check
          command: |
              # Check all parameters are passed
              if [ -z "<< parameters.dotnet_solution_folder >>" ]; then
                echo "dotnet_solution_folder must be passed as a parameter!"
                circleci-agent step halt
              else
                export SOLUTION_FOLDER="<< parameters.dotnet_solution_folder >>"
              fi

              if [ -z "<< parameters.dotnet_project_name >>" ]; then
                echo "dotnet_project_name must be passed as a parameter!"
                circleci-agent step halt
              else
                export PROJECT_NAME="<< parameters.dotnet_project_name >>"
              fi

              echo "export SOLUTION_FOLDER=$SOLUTION_FOLDER" >> "$BASH_ENV"
              echo "export PROJECT_NAME=$PROJECT_NAME" >> "$BASH_ENV"
      - checkout
          
      - run:
          name: Add github as a nuget package source
          command: nuget_add_github
          
      - run:
          name: Build
          command: dotnet_sign_and_build

#======================================= End Build ====================================

#======================================= Test ====================================
  test:
    parameters:
      dotnet_solution_folder:
        type: string
        default: ""
      dotnet_project_name:
        type: string
        default: ""
    machine:
      image: ubuntu-2204:current
    environment:
      MSBUILDTERMINALLOGGER: off #Workaround while https://github.com/dotnet/msbuild/issues/11213 exists
    steps:
      - run:
          name: Parameter check
          command: |
              # Check all parameters are passed
              if [ -z "<< parameters.dotnet_solution_folder >>" ]; then
                echo "dotnet_solution_folder must be passed as a parameter!"
                circleci-agent step halt
              else
                export SOLUTION_FOLDER="<< parameters.dotnet_solution_folder >>"
              fi

              if [ -z "<< parameters.dotnet_project_name >>" ]; then
                echo "dotnet_project_name must be passed as a parameter!"
                circleci-agent step halt
              else
                export PROJECT_NAME="<< parameters.dotnet_project_name >>"
              fi

              echo "export SOLUTION_FOLDER=$SOLUTION_FOLDER" >> "$BASH_ENV"
              echo "export PROJECT_NAME=$PROJECT_NAME" >> "$BASH_ENV"
      - checkout

      # Uncomment if you need xUnit Testcontainers support
      #- run: docker version
      #- run: docker info
  
      # Install .NET SDK
      # DOTNET_ROOT must be set explicitly so that global tools (e.g. coverlet.console) can
      # locate the runtime. Without it, tools fail with "Failed to resolve libhostfxr.so".
      # PATH is prepended (not appended) so the freshly-installed dotnet takes priority over
      # any older system-installed dotnet on the ubuntu-2204 machine image.
      - run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 9.0
          echo 'export DOTNET_ROOT="$HOME/.dotnet"' >> "$BASH_ENV"
          echo 'export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"' >> "$BASH_ENV"
      - run: dotnet --info
          
      - run:
          name: Test
          command: |
            TEST_PROJECT="${PROJECT_NAME}.Test/${PROJECT_NAME}.Test.csproj"

            if [ ! -f "$TEST_PROJECT" ]; then
              echo "Test project not found at: $TEST_PROJECT"
              echo "Skipping tests..."
              exit 0
            fi

            dotnet build ${TEST_PROJECT} --configuration Release

            # xUnit v3 (OutputType=Exe) runs via Microsoft Testing Platform (MTP).
            # Using --collect:"XPlat Code Coverage" forces dotnet test into VSTest mode,
            # which launches the test process with --info. MTP-based runners do not
            # recognise --info and emit an error string instead of JSON, causing:
            #   "Test process did not return valid JSON (non-object)"
            # Fix: use coverlet.console (global tool) to wrap the process externally
            # so coverage is collected without involving VSTest data collectors.
            dotnet tool install --global coverlet.console
            mkdir -p ./TestResults
            coverlet "./${PROJECT_NAME}.Test/bin/Release/net9.0/${PROJECT_NAME}.Test.dll" \
              --target "dotnet" \
              --targetargs "test ${TEST_PROJECT} --configuration Release --no-build" \
              --format opencover \
              --output ./TestResults/coverage.opencover.xml

      - run:
          name: Upload Coverage to Codecov
          command: |
            # coverlet.console writes to the exact path given by --output,
            # so the location is fixed. Unlike VSTest collectors, there is no GUID subdirectory.
            COVERAGE_FILE="./TestResults/coverage.opencover.xml"

            if [ ! -f "$COVERAGE_FILE" ]; then
              echo "Coverage file not found!"
              exit 1
            fi
            
            echo "Found coverage file: $COVERAGE_FILE"
            
            # Construct dynamic token variable name
            # Replace dots with underscores for CircleCI context variable naming
            PROJECT_NAME_SAFE=$(echo "$PROJECT_NAME" | tr '.' '_')
            TOKEN_VAR_NAME="CODECOV_TOKEN_${PROJECT_NAME_SAFE}"
            
            # Use variable indirection to get the token value
            CODECOV_TOKEN="${!TOKEN_VAR_NAME}"
            
            if [ -z "$CODECOV_TOKEN" ]; then
              echo "Error: ${TOKEN_VAR_NAME} is not set in the CircleCI context!"
              exit 1
            fi
            
            # Dynamically construct repository slug
            REPO_SLUG="${GITHUB_USERNAME}/${PROJECT_NAME}"
            
            # Download and run Codecov uploader
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov \
              -t ${CODECOV_TOKEN} \
              -f ${COVERAGE_FILE} \
              -r ${REPO_SLUG} \
              -b ${CIRCLE_BUILD_NUM} \
              -C ${CIRCLE_SHA1} \
              -B ${CIRCLE_BRANCH}

#======================================= End Test ====================================

#======================================= PackAndPublish ====================================
  pack_and_publish:
    parameters:
      dotnet_solution_folder:
        type: string
        default: ""
      dotnet_project_name:
        type: string
        default: ""
    docker:
      - image: $DOCKER_HUB_USERNAME/baubit:base
        auth:
            username: $DOCKER_HUB_USERNAME
            password: $DOCKER_HUB_PASSWORD
    steps:
      - run:
          name: Parameter check
          command: |
              # Check all parameters are passed
              if [ -z "<< parameters.dotnet_solution_folder >>" ]; then
                echo "dotnet_solution_folder must be passed as a parameter!"
                circleci-agent step halt
              else
                export SOLUTION_FOLDER="<< parameters.dotnet_solution_folder >>"
              fi

              if [ -z "<< parameters.dotnet_project_name >>" ]; then
                echo "dotnet_project_name must be passed as a parameter!"
                circleci-agent step halt
              else
                export PROJECT_NAME="<< parameters.dotnet_project_name >>"
              fi

              echo "export SOLUTION_FOLDER=$SOLUTION_FOLDER" >> "$BASH_ENV"
              echo "export PROJECT_NAME=$PROJECT_NAME" >> "$BASH_ENV"
      - checkout
          
      - run:
          name: Add github as a nuget package source
          command: nuget_add_github
          
      - run:
          name: Build
          command: dotnet_sign_and_build

      - run:
          name: Pack_and_publish
          command: pack_and_publish_signed
#======================================= End PackAndPublish ====================================

#======================================= Release =========================================
  release:
    parameters:
      dotnet_project_name:
        type: string
        default: ""
    docker:
      - image: $DOCKER_HUB_USERNAME/baubit:base
        auth:
            username: $DOCKER_HUB_USERNAME
            password: $DOCKER_HUB_PASSWORD
    steps:
      - run:
          name: Parameter check
          command: |
              # Check all parameters are passed
              if [ -z "<< parameters.dotnet_project_name >>" ]; then
                echo "dotnet_project_name must be passed as a parameter!"
                circleci-agent step halt
              else
                export PROJECT_NAME="<< parameters.dotnet_project_name >>"
              fi
              echo "export PROJECT_NAME=$PROJECT_NAME" >> "$BASH_ENV"

      - checkout

      - run:
          name: Publish_to_nuget_org
          command: publish_to_nuget_org
#======================================= End Release =====================================
